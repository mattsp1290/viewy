name: CI

on:
  push:
    branches:
      - main
      - "ralph/**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: macos-latest
            compiler: clang
          - os: windows-latest
            compiler: mingw
          - os: windows-latest
            compiler: vcc
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (${{ matrix.compiler }})
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2.3.0
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # webview/webview needs GTK + WebKitGTK on Linux; the Linux smoke
      # runs under a virtual display.
      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-dev libwebkit2gtk-4.1-dev

      # The vcc lane needs the MSVC toolchain on PATH (C++14 for WebView2).
      - name: Set up MSVC
        if: matrix.compiler == 'vcc'
        uses: ilammy/msvc-dev-cmd@v1

      # Nim defaults to gcc/clang/MinGW per platform, which matches every
      # other lane; only vcc needs explicit selection. Appending to nim.cfg
      # reaches every nim invocation below, including nimble's test compiles.
      - name: Select MSVC backend (vcc lane)
        if: matrix.compiler == 'vcc'
        shell: bash
        run: printf '\n--cc:vcc\n' >> nim.cfg

      - name: nimble check
        run: nimble check

      - name: nim check library root
        run: nim check --hints:off src/viewy.nim

      - name: Run dev-mode strdefine test
        run: nim c --hints:off --mm:orc --threads:on -d:viewyDev=http://127.0.0.1:5174 -r tests/test_app_dev.nim

      - name: Create build directory
        run: python -c "import os; os.makedirs('build', exist_ok=True)"

      - name: Build window smoke
        run: nim c --hints:off --mm:orc --threads:on -o:build/window_smoke tests/spike/window_smoke.nim

      - name: Run window smoke (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/window_smoke"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run window smoke (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/window_smoke.exe" if os.name == "nt" else "build/window_smoke"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build windowed runtime RPC test
        run: nim c --hints:off --mm:orc --threads:on -o:build/test_windowed tests/test_windowed.nim

      - name: Run windowed runtime RPC test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_windowed"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run windowed runtime RPC test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_windowed.exe" if os.name == "nt" else "build/test_windowed"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build async RPC windowed test
        run: nim c --hints:off --mm:orc --threads:on -o:build/test_async_rpc tests/test_async_rpc.nim

      - name: Run async RPC windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_async_rpc"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run async RPC windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_async_rpc.exe" if os.name == "nt" else "build/test_async_rpc"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build handoff windowed test
        run: nim c --hints:off --mm:orc --threads:on -o:build/test_wv_handoff tests/test_wv_handoff.nim

      - name: Run handoff windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_wv_handoff"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run handoff windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_wv_handoff.exe" if os.name == "nt" else "build/test_wv_handoff"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build emit stress windowed test
        run: nim c --hints:off --mm:orc --threads:on -o:build/test_emit_stress tests/test_emit_stress.nim

      - name: Run emit stress windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_emit_stress"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run emit stress windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_emit_stress.exe" if os.name == "nt" else "build/test_emit_stress"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build release embedded asset windowed test
        run: nim c --hints:off --mm:orc --threads:on -d:release -d:viewyGeneratedAssets --path:tests/fixtures/assets_single -o:build/test_assets_single tests/test_assets_single.nim

      - name: Run release embedded asset windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_assets_single"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run release embedded asset windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_assets_single.exe" if os.name == "nt" else "build/test_assets_single"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Run tests (xvfb)
        if: runner.os == 'Linux'
        run: VIEWY_SKIP_WINDOWED=1 xvfb-run -a nimble test -y

      - name: Run tests
        if: runner.os != 'Linux'
        run: nimble test -y
        env:
          VIEWY_SKIP_WINDOWED: "1"

      - name: nimble check CLI
        working-directory: cli
        run: nimble check

      - name: Run CLI tests (xvfb)
        if: runner.os == 'Linux'
        working-directory: cli
        run: xvfb-run -a nimble test -y
        env:
          VIEWY_LIB_SRC: ${{ github.workspace }}

      - name: Run CLI tests
        if: runner.os != 'Linux'
        working-directory: cli
        run: nimble test -y
        env:
          VIEWY_LIB_SRC: ${{ github.workspace }}

      - name: Run CLI dev loop test (xvfb)
        if: runner.os == 'Linux'
        working-directory: cli
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "nim", "c", "--path:src", "-r", "tests/test_devloop.nim"],
              check=True,
              timeout=300,
          )
          PY
        env:
          VIEWY_LIB_SRC: ${{ github.workspace }}

      # Wired but not yet gating (spec §9): surfaces drift without failing CI.
      - name: nimpretty (non-gating)
        if: runner.os == 'Linux'
        continue-on-error: true
        run: |
          nimble pretty
          git diff --exit-code
