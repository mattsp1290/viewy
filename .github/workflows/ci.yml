name: CI

on:
  push:
    branches:
      - main
      - "ralph/**"
  pull_request:
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    name: docs
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2.3.0
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux webview dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          pkg-config --atleast-version=2.40 webkit2gtk-4.1 || {
            echo "libwebkit2gtk-4.1-dev must provide webkit2gtk-4.1 >= 2.40"
            pkg-config --modversion webkit2gtk-4.1 || true
            exit 1
          }

      - name: Install Nimble dependencies
        run: nimble install -d -y

      - name: nim doc project
        run: nim doc --project --hints:off -d:viewyBackend=lite --outdir:build/docs src/viewy.nim

  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: macos-latest
            compiler: clang
          - os: windows-latest
            compiler: mingw
          - os: windows-latest
            compiler: vcc
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (${{ matrix.compiler }})
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2.3.0
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # webview/webview needs GTK + WebKitGTK on Linux; the Linux smoke
      # runs under a virtual display.
      - name: Install Linux webview dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth libgtk-3-dev libwebkit2gtk-4.1-dev
          pkg-config --atleast-version=2.40 webkit2gtk-4.1 || {
            echo "libwebkit2gtk-4.1-dev must provide webkit2gtk-4.1 >= 2.40"
            pkg-config --modversion webkit2gtk-4.1 || true
            exit 1
          }

      # The vcc lane needs the MSVC toolchain on PATH (C++14 for WebView2).
      - name: Set up MSVC
        if: matrix.compiler == 'vcc'
        uses: ilammy/msvc-dev-cmd@v1

      # Nim defaults to gcc/clang/MinGW per platform, which matches every
      # other lane; only vcc needs explicit selection. Appending to nim.cfg
      # reaches every nim invocation below, including nimble's test compiles.
      - name: Select MSVC backend (vcc lane)
        if: matrix.compiler == 'vcc'
        shell: bash
        run: printf '\n--cc:vcc\n' >> nim.cfg

      - name: nimble check
        run: nimble check

      - name: nim check library root
        run: nim check --hints:off -d:viewyBackend=lite src/viewy.nim

      - name: nim doc library root
        run: nim doc --hints:off -d:viewyBackend=lite src/viewy.nim

      - name: Run dev-mode strdefine test
        run: nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -d:viewyDev=http://127.0.0.1:5174 -r tests/test_app_dev.nim

      - name: Check WebView2 SDK ABI pin
        run: nim c --hints:off --mm:orc --threads:on --path:src -r tests/native/test_windows_webview2_pin.nim

      - name: Check Windows lite WebView2 builtin compile
        if: runner.os == 'Windows'
        run: |
          python -c "import os; os.makedirs('build', exist_ok=True)"
          nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -o:build/window_smoke_webview2_pin tests/spike/window_smoke.nim

      - name: Check native Windows WebView2 environment spike
        if: runner.os == 'Windows'
        run: nim check --hints:off --mm:orc --threads:on -d:nimcheck --path:src tests/native/test_windows_webview2_env_spike.nim

      - name: Check native Windows WebView2 COM FFI
        if: runner.os == 'Windows'
        run: nim check --hints:off --mm:orc --threads:on -d:nimcheck --path:src tests/native/test_windows_com.nim

      - name: Check native Windows WebView2 wiring
        if: runner.os == 'Windows'
        run: nim check --hints:off --mm:orc --threads:on -d:nimcheck --path:src tests/native/test_windows_webview2.nim

      - name: Check native Windows Win32 FFI
        if: runner.os == 'Windows'
        run: nim check --hints:off --mm:orc --threads:on -d:nimcheck --path:src tests/native/test_windows_win32.nim

      - name: Check native Windows backend lifecycle
        if: runner.os == 'Windows'
        run: |
          python -c "import os; os.makedirs('build', exist_ok=True)"
          nim check --hints:off --mm:orc --threads:on -d:nimcheck --path:src tests/native/test_windows_backend.nim
          nim c --hints:off --mm:orc --threads:on -d:viewyBackend=native --path:src -o:build/test_windows_backend tests/native/test_windows_backend.nim

      - name: Check native Windows scheme declarations
        if: runner.os == 'Windows'
        run: nim check --hints:off --mm:orc --threads:on -d:nimcheck --path:src tests/native/test_windows_scheme.nim

      - name: Check native Windows tray declarations
        if: runner.os == 'Windows'
        run: nim check --hints:off --mm:orc --threads:on -d:nimcheck --path:src tests/native/test_windows_tray.nim

      - name: Check native Windows IPC declarations
        if: runner.os == 'Windows'
        run: nim check --hints:off --mm:orc --threads:on -d:nimcheck --path:src tests/native/test_windows_ipc.nim

      - name: Check native Linux GTK FFI
        if: runner.os == 'Linux'
        run: nim c --hints:off --mm:orc --threads:on -r tests/native/test_linux_gtk_ffi.nim

      - name: Check native Linux WebKitGTK FFI
        if: runner.os == 'Linux'
        run: nim c --hints:off --mm:orc --threads:on -r tests/native/test_linux_webkitgtk_ffi.nim

      - name: Check native macOS glue
        if: runner.os == 'macOS'
        run: nim c --hints:off --mm:orc --threads:on -r tests/native/test_darwin_glue.nim

      - name: Check native macOS backend lifecycle
        if: runner.os == 'macOS'
        run: |
          mkdir -p build
          nim c --hints:off --mm:orc --threads:on -o:build/test_darwin_backend tests/native/test_darwin_backend.nim
          VIEWY_NATIVE_DARWIN_SMOKE=1 build/test_darwin_backend

      - name: Check native macOS IPC parity
        if: runner.os == 'macOS'
        run: |
          mkdir -p build
          nim c --hints:off --mm:orc --threads:on -o:build/test_darwin_ipc tests/native/test_darwin_ipc.nim
          VIEWY_NATIVE_DARWIN_IPC=1 build/test_darwin_ipc

      - name: Check native macOS scheme conformance
        if: runner.os == 'macOS'
        run: |
          mkdir -p build
          nim c --hints:off --mm:orc --threads:on -o:build/test_darwin_scheme tests/native/test_darwin_scheme.nim
          VIEWY_NATIVE_DARWIN_SCHEME=1 build/test_darwin_scheme

      - name: Check native Linux backend lifecycle
        if: runner.os == 'Linux'
        run: |
          mkdir -p build
          nim c --hints:off --mm:orc --threads:on -o:build/test_linux_backend tests/native/test_linux_backend.nim
          VIEWY_NATIVE_LINUX_SMOKE=1 xvfb-run -a build/test_linux_backend

      - name: Check native Linux scheme conformance
        if: runner.os == 'Linux'
        run: |
          mkdir -p build
          nim c --hints:off --mm:orc --threads:on -o:build/test_linux_scheme tests/native/test_linux_scheme.nim
          VIEWY_NATIVE_LINUX_SCHEME=1 xvfb-run -a build/test_linux_scheme

      - name: Check native Linux Tier-2 windowed suite
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          for test in \
            test_windowed \
            test_async_rpc \
            test_backend_handoff \
            test_backend_teardown \
            test_emit_stress
          do
            nim c --hints:off --mm:orc --threads:on -d:viewyBackend=native -o:build/${test}_native tests/${test}.nim
            xvfb-run -a build/${test}_native
          done

      - name: Check native macOS Tier-2 windowed suite
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          for test in \
            test_windowed \
            test_async_rpc \
            test_backend_handoff \
            test_backend_teardown \
            test_emit_stress
          do
            nim c --hints:off --mm:orc --threads:on -d:viewyBackend=native -o:build/${test}_native_macos tests/${test}.nim
            python - "${test}" <<'PY'
          import subprocess
          import sys

          test = sys.argv[1]
          subprocess.run([f"build/{test}_native_macos"], check=True, timeout=120)
          PY
          done

      - name: Create build directory
        run: python -c "import os; os.makedirs('build', exist_ok=True)"

      - name: Build window smoke
        run: nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -o:build/window_smoke tests/spike/window_smoke.nim

      - name: Run window smoke (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/window_smoke"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run window smoke (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/window_smoke.exe" if os.name == "nt" else "build/window_smoke"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build windowed runtime RPC test
        run: nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -o:build/test_windowed tests/test_windowed.nim

      - name: Run windowed runtime RPC test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_windowed"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run windowed runtime RPC test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_windowed.exe" if os.name == "nt" else "build/test_windowed"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build async RPC windowed test
        run: nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -o:build/test_async_rpc tests/test_async_rpc.nim

      - name: Run async RPC windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_async_rpc"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run async RPC windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_async_rpc.exe" if os.name == "nt" else "build/test_async_rpc"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build handoff windowed test
        run: nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -o:build/test_backend_handoff tests/test_backend_handoff.nim

      - name: Run handoff windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_backend_handoff"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run handoff windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_backend_handoff.exe" if os.name == "nt" else "build/test_backend_handoff"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build teardown windowed test
        run: nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -o:build/test_backend_teardown tests/test_backend_teardown.nim

      - name: Run teardown windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_backend_teardown"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run teardown windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_backend_teardown.exe" if os.name == "nt" else "build/test_backend_teardown"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build emit stress windowed test
        run: nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -o:build/test_emit_stress tests/test_emit_stress.nim

      - name: Run emit stress windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_emit_stress"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run emit stress windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_emit_stress.exe" if os.name == "nt" else "build/test_emit_stress"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Build release embedded asset windowed test
        run: nim c --hints:off --mm:orc --threads:on -d:viewyBackend=lite -d:release -d:viewyGeneratedAssets --path:tests/fixtures/assets_single -o:build/test_assets_single tests/test_assets_single.nim

      - name: Run release embedded asset windowed test (xvfb, 120s watchdog)
        if: runner.os == 'Linux'
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "build/test_assets_single"],
              check=True,
              timeout=120,
          )
          PY

      - name: Run release embedded asset windowed test (120s watchdog)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          import os
          import subprocess

          exe = "build/test_assets_single.exe" if os.name == "nt" else "build/test_assets_single"
          subprocess.run([exe], check=True, timeout=120)
          PY

      - name: Assert hello example line budget
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          line_count = len(Path("examples/hello/src/main.nim").read_text().splitlines())
          if line_count >= 60:
              raise SystemExit(f"hello example is {line_count} lines; expected < 60")
          print(f"hello example line count: {line_count}")
          PY

      - name: Assert Linux hello release binary size
        if: runner.os == 'Linux'
        working-directory: examples/hello
        run: |
          python -c "import os; os.makedirs('build', exist_ok=True)"
          nim c --hints:off -d:viewyBackend=lite -d:release --mm:orc --threads:on -d:strip --opt:size -o:build/hello src/main.nim
          size=$(stat -c %s build/hello)
          echo "hello release binary size: ${size} bytes"
          test "$size" -lt 3145728

      - name: Build hello example
        working-directory: examples/hello
        shell: bash
        run: |
          python -c "import os; os.makedirs('build', exist_ok=True)"
          nim c --hints:off -d:viewyBackend=lite --mm:orc --threads:on -o:build/hello src/main.nim

      - name: Build todo example
        working-directory: examples/todo
        shell: bash
        run: |
          python -c "import os; os.makedirs('build', exist_ok=True)"
          nim c --hints:off -d:viewyBackend=lite --mm:orc --threads:on -o:build/todo src/main.nim

      - name: Run tests (xvfb)
        if: runner.os == 'Linux'
        run: VIEWY_SKIP_WINDOWED=1 xvfb-run -a nimble test -y

      - name: Run tests
        if: runner.os != 'Linux'
        run: nimble test -y
        env:
          VIEWY_SKIP_WINDOWED: "1"

      - name: nimble check CLI
        working-directory: cli
        run: nimble check

      - name: Run viewy doctor (informational)
        working-directory: cli
        continue-on-error: true
        run: nim c --path:src -r src/viewy.nim doctor

      - name: Run CLI tests (xvfb)
        if: runner.os == 'Linux'
        working-directory: cli
        run: xvfb-run -a nimble test -y
        env:
          VIEWY_LIB_SRC: ${{ github.workspace }}

      - name: Run CLI tests
        if: runner.os != 'Linux'
        working-directory: cli
        run: nimble test -y
        env:
          VIEWY_LIB_SRC: ${{ github.workspace }}

      - name: Run CLI dev loop test (xvfb)
        if: runner.os == 'Linux'
        working-directory: cli
        run: |
          python - <<'PY'
          import subprocess

          subprocess.run(
              ["xvfb-run", "-a", "nim", "c", "--path:src", "-r", "tests/test_devloop.nim"],
              check=True,
              timeout=300,
          )
          PY
        env:
          VIEWY_LIB_SRC: ${{ github.workspace }}

      - name: Build React and Svelte templates
        if: runner.os == 'Linux'
        run: python cli/tests/test_templates.py
        env:
          VIEWY_LIB_SRC: ${{ github.workspace }}

      - name: nimpretty
        if: runner.os == 'Linux'
        run: |
          nimble pretty
          git diff --exit-code

  linux-valgrind:
    runs-on: ubuntu-latest
    name: linux valgrind
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2.3.0
        with:
          nim-version: "2.2.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux webview and Valgrind dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xauth valgrind libgtk-3-dev libwebkit2gtk-4.1-dev
          pkg-config --atleast-version=2.40 webkit2gtk-4.1 || {
            echo "libwebkit2gtk-4.1-dev must provide webkit2gtk-4.1 >= 2.40"
            pkg-config --modversion webkit2gtk-4.1 || true
            exit 1
          }

      - name: Install Nimble dependencies
        run: nimble install -d -y

      - name: Build Valgrind targets
        run: |
          mkdir -p build/valgrind
          nim c --hints:off --mm:orc --threads:on -d:useMalloc -d:viewyBackend=native -o:build/valgrind/test_emit_stress tests/test_emit_stress.nim
          nim c --hints:off --mm:orc --threads:on -d:useMalloc -o:build/valgrind/test_linux_scheme_flood tests/native/test_linux_scheme_flood.nim

      - name: Run native Linux Valgrind suite
        shell: bash
        env:
          G_SLICE: always-malloc
          G_DEBUG: gc-friendly
          JSC_useJIT: "false"
        run: |
          set -euo pipefail
          run_valgrind() {
            timeout 240s xvfb-run -a valgrind \
              --tool=memcheck \
              --error-exitcode=99 \
              --trace-children=yes \
              --trace-children-skip='*/xvfb-run,*/Xvfb,*/xauth,*/dbus-launch,*/dbus-daemon' \
              --leak-check=full \
              --show-leak-kinds=definite \
              --errors-for-leak-kinds=definite \
              --track-origins=yes \
              --num-callers=32 \
              --suppressions=ci/valgrind.supp \
              "$@"
          }

          run_valgrind build/valgrind/test_emit_stress
          VIEWY_NATIVE_LINUX_SCHEME_FLOOD=1 run_valgrind build/valgrind/test_linux_scheme_flood
